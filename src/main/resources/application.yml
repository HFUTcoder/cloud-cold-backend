spring:
  application:
    name: cloud-cold-agent
  servlet:
    multipart:
      max-file-size: 10MB      # 单文件最大大小，根据需求调整
      max-request-size: 10MB   # 单次请求总大小，根据需求调整
      enabled: true            # 启用文件上传
  ai:
    alibaba:
      python:
        tool:
          enabled: true
    vectorstore:
      milvus:
        client:
          host: "localhost"
          port: 19530
          username: "root"
          password: "milvus"
        databaseName: "default"
        collectionName: "vector_store"
        embeddingDimension: 1536
        indexType: IVF_FLAT
        metricType: COSINE
        initialize-schema: true
  profiles:
    active: local
  multipart:
    enabled: true
    max-file-size: 100MB
    max-request-size: 100MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cloud_cold
  session:
    store-type: redis
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s

server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.shenchen.cloudcoldagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false

minio:
  url: http://localhost:9000
  bucketName: cloud-cold
  endpoint: http://localhost:9000

cloudcold:
  search:
    mock:
      enabled: true
  hitl:
    enabled: true
    intercept-tool-names:
      - execute_skill_script
