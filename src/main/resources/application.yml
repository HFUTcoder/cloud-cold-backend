spring:
  profiles:
    active: local
  application:
    name: cloud-cold-agent
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
          maxTokens: 5000
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/
        options:
          dimensions: 1536
          model: text-embedding-v4
    alibaba:
      python:
        tool:
          enabled: true
      toolcalling:
        tavilysearch:
          enabled: false
          network-timeout: 10000
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: rag_docs_vector
        dimensions: 1536
        similarity: cosine
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cloud_cold
    username: root
    password: 1234
  session:
    store-type: redis
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s
  elasticsearch:
    uris: http://localhost:9200
    insecure: false

server:
  port: 8081
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.shenchen.cloudcoldagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: cloud-cold

cloudcold:
  upload:
    max-file-size: 100MB
    max-request-size: 100MB
  search:
    mock:
      enabled: true
  pdf:
    multimodal:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      model: qwen3-vl-plus
      temperature: 0.2
  hitl:
    enabled: true
    intercept-tool-names:
      - execute_skill_script
  long-term-memory:
    enabled: true
    trigger-rounds: 5
    retrieve-top-k: 5
    similarity-threshold: 0.5
    max-prompt-memories: 4
    max-memory-chars: 400
    default-pet-name: 小云
    keyword-index-name: user_long_term_memory_docs
    vector-index-name: user_long_term_memory_vector
    vector-dimensions: 1536
