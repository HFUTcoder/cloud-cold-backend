spring:
  application:
    name: cloud-cold-agent
  profiles:
    active: local
  multipart:
    enabled: true
    max-file-size: 100MB
    max-request-size: 100MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cloud_cold
    username: root
  session:
    store-type: redis
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s

server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.shenchen.cloudcoldagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false

cloudcold:
  search:
    mock:
      enabled: true
