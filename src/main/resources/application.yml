spring:
  application:
    name: cloud-cold-agent
  servlet:
    multipart:
      enabled: true
      max-file-size: ${cloudcold.upload.max-file-size}
      max-request-size: ${cloudcold.upload.max-request-size}
  ai:
    alibaba:
      python:
        tool:
          enabled: true
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: rag_docs_vector
        dimensions: 1536
        similarity: cosine
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cloud_cold
  session:
    store-type: redis
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s
  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8081
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.shenchen.cloudcoldagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false

minio:
  bucketName: cloud-cold
  endpoint: http://localhost:9000

cloudcold:
  upload:
    max-file-size: 100MB
    max-request-size: 100MB
  search:
    mock:
      enabled: true
  pdf:
    multimodal:
      api-key: ${spring.ai.openai.api-key:}
      base-url: ${spring.ai.openai.base-url:}
      model: qwen3-vl-plus
      temperature: 0.2
  hitl:
    enabled: true
    intercept-tool-names:
      - execute_skill_script
